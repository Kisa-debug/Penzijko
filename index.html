<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penzijní kalkulačka</title>
    <style>
        :root {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: #1f2937;
            background: #eef2f7;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0 auto;
            max-width: 1100px;
            padding: 24px;
            background-color: #eef2f7;
        }
        h2, h4 { margin: 0 0 18px; color: #111827; }
        .card {
            background: #ffffff;
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
            margin-bottom: 20px;
        }
        .input-group { margin-bottom: 18px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #374151; }
        input[type="number"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 14px;
            font-size: 1rem;
        }
        .input-grid {
            display: grid;
            gap: 16px;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        }
        .results {
            padding: 20px;
            background: #ecf5ff;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        .res-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(15, 23, 42, 0.06);
        }
        .val { font-weight: 700; color: #0f172a; }
        .fund-section {
            background: #f8fafc;
            padding: 20px;
            border-radius: 18px;
            margin-bottom: 18px;
        }
        .fund-row {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 14px;
            margin-bottom: 14px;
            align-items: end;
        }
        .summary-line { text-align: right; font-weight: 700; border-top: 1px solid #d1d5db; padding-top: 10px; }
        
        .top-layout { display: flex; flex-direction: column; gap: 20px; }

        @media (min-width: 900px) {
            .top-layout { 
                display: grid; 
                grid-template-columns: 1.4fr 1fr; 
                align-items: stretch; 
            }
        }

        .chart-card { display: flex; flex-direction: column; height: 100%; }
        .canvas-container { flex-grow: 1; position: relative; min-height: 320px; width: 100%; margin: 20px 0; }
        canvas { position: absolute; top: 0; left: 0; width: 100% !important; height: 100% !important; }

        .scenario-box {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            padding: 14px;
            background: #f8fafc;
            border-radius: 14px;
        }
    </style>
</head>
<body>

<div class="top-layout">
    <div class="card">
        <h2>Penzijní nastavení</h2>
        <div class="input-group">
            <label>Aktuálně naspořeno (Kč)</label>
            <input type="number" id="currentAmount" value="0">
        </div>
        <div class="input-grid">
            <div class="input-group">
                <label>Můj vklad (Kč)</label>
                <input type="number" id="myDeposit" value="1700">
            </div>
            <div class="input-group">
                <label>Zaměstnavatel (Kč)</label>
                <input type="number" id="employerDeposit" value="0">
            </div>
        </div>
        <div class="fund-section">
            <h4 style="margin-top: 0;">Fondy (Výnos % | Podíl %)</h4>
            <div class="fund-row">
                <div><label>Konzervativní</label><input type="number" id="fund1Yield" value="3.0" step="0.1"></div>
                <div><label>Podíl %</label><input type="number" id="fund1Share" value="20"></div>
            </div>
            <div class="fund-row">
                <div><label>Vyvážený</label><input type="number" id="fund2Yield" value="5.0" step="0.1"></div>
                <div><label>Podíl %</label><input type="number" id="fund2Share" value="30"></div>
            </div>
            <div class="fund-row">
                <div><label>Dynamický</label><input type="number" id="fund3Yield" value="8.0" step="0.1"></div>
                <div><label>Podíl %</label><input type="number" id="fund3Share" value="50"></div>
            </div>
            <div class="summary-line">Součet: <span id="totalShareDisplay">100</span> %</div>
        </div>
        <div class="input-grid">
            <div class="input-group">
                <label>Inflace (%)</label>
                <input type="number" id="inflation" value="3" step="0.1">
            </div>
            <div class="input-group">
                <label>Let do důchodu</label>
                <input type="number" id="years" value="30">
            </div>
        </div>
    </div>

    <div class="card chart-card">
        <h4>Výsledky a graf</h4>
        <div class="results">
            <div class="res-item"><span>Vážený výnos:</span> <span id="avgYield" class="val">0 %</span></div>
            <div class="res-item"><span>Nominálně:</span> <span id="nominalResult" class="val">0 Kč</span></div>
            <div class="res-item"><span>Reálně:</span> <span id="realResult" class="val">0 Kč</span></div>
        </div>
        <div class="canvas-container">
            <canvas id="growthChart"></canvas>
        </div>
        <div class="scenario-box">
            <label><input type="checkbox" class="scenario-check" data-fund="1"> Konzervativní</label>
            <label><input type="checkbox" class="scenario-check" data-fund="2"> Vyvážený</label>
            <label><input type="checkbox" class="scenario-check" data-fund="3"> Dynamický</label>
        </div>
    </div>
</div>

<script>
    const storageKey = 'penzijni_data_final_v1';

    function calculate() {
        const cur = parseFloat(document.getElementById('currentAmount').value) || 0;
        const depM = parseFloat(document.getElementById('myDeposit').value) || 0;
        const depE = parseFloat(document.getElementById('employerDeposit').value) || 0;
        const y1 = parseFloat(document.getElementById('fund1Yield').value) || 0;
        const s1 = parseFloat(document.getElementById('fund1Share').value) || 0;
        const y2 = parseFloat(document.getElementById('fund2Yield').value) || 0;
        const s2 = parseFloat(document.getElementById('fund2Share').value) || 0;
        const y3 = parseFloat(document.getElementById('fund3Yield').value) || 0;
        const s3 = parseFloat(document.getElementById('fund3Share').value) || 0;
        const inf = parseFloat(document.getElementById('inflation').value) || 0;
        const yrs = parseInt(document.getElementById('years').value) || 0;

        const totalS = s1 + s2 + s3;
        document.getElementById('totalShareDisplay').innerText = totalS;
        document.getElementById('totalShareDisplay').style.color = (totalS === 100) ? 'green' : 'red';

        const userWeightedYield = ((s1*y1) + (s2*y2) + (s3*y3)) / 100 / 100;
        const bonus = (depM >= 500) ? Math.min(depM * 0.2, 340) : 0;
        const totalMonthDep = depM + depE + bonus;

        let userNom = [cur], userReal = [cur];
        let scenarios = [];
        document.querySelectorAll('.scenario-check:checked').forEach(cb => {
            const fIdx = cb.dataset.fund;
            scenarios.push({ yield: parseFloat(document.getElementById('fund'+fIdx+'Yield').value)/100, data: [cur] });
        });

        let tUser = cur;
        let tScen = scenarios.map(() => cur);

        for(let y=1; y<=yrs; y++) {
            for(let m=0; m<12; m++) {
                tUser = (tUser + totalMonthDep) * (1 + userWeightedYield/12);
                scenarios.forEach((s, i) => tScen[i] = (tScen[i] + totalMonthDep) * (1 + s.yield/12));
            }
            userNom.push(tUser);
            userReal.push(tUser / Math.pow(1 + inf/100, y));
            scenarios.forEach((s, i) => s.data.push(tScen[i]));
        }

        document.getElementById('avgYield').innerText = (userWeightedYield * 100).toFixed(2) + " %";
        document.getElementById('nominalResult').innerText = Math.round(tUser).toLocaleString() + " Kč";
        document.getElementById('realResult').innerText = Math.round(userReal[userReal.length-1]).toLocaleString() + " Kč";

        const canvas = document.getElementById('growthChart');
        canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0,0,canvas.width, canvas.height);

        const p = { l: 60, r: 10, t: 30, b: 30 };
        const w = canvas.width - p.l - p.r;
        const h = canvas.height - p.t - p.b;
        const max = Math.max(...userNom, ...userReal, 1);

        ctx.strokeStyle = '#eee'; ctx.fillStyle = '#999'; ctx.font = '10px sans-serif';
        for(let i=0; i<=5; i++) {
            const y = p.t + h - (i/5)*h;
            ctx.beginPath(); ctx.moveTo(p.l, y); ctx.lineTo(p.l+w, y); ctx.stroke();
            ctx.fillText((max*(i/5)/1000000).toFixed(1) + "M", 5, y+3);
        }

        function plot(data, col, lw, dash) {
            ctx.strokeStyle = col; ctx.lineWidth = lw; ctx.setLineDash(dash ? [5,5] : []);
            ctx.beginPath();
            data.forEach((v, i) => {
                const x = p.l + (i/(data.length-1))*w;
                const y = p.t + h - (v/max)*h;
                if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
            });
            ctx.stroke();
        }

        scenarios.forEach(s => plot(s.data, '#cbd5e1', 1, true));
        plot(userReal, '#f97316', 2, false);
        plot(userNom, '#2563eb', 4, false);

        const saved = {};
        document.querySelectorAll('input:not(.scenario-check)').forEach(i => saved[i.id] = i.value);
        localStorage.setItem(storageKey, JSON.stringify(saved));
    }

    window.onload = () => {
        const data = JSON.parse(localStorage.getItem(storageKey));
        if(data) Object.keys(data).forEach(k => { if(document.getElementById(k)) document.getElementById(k).value = data[k]; });
        document.querySelectorAll('input').forEach(i => i.oninput = calculate);
        calculate();
    };
    window.onresize = calculate;
</script>
</body>
</html>
